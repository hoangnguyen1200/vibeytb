name: Analytics Tracker (24h Performance)

on:
  schedule:
    # Run 1h after daily pipeline (VN 7:00 AM = UTC 0:00)
    - cron: "0 0 * * *"
  workflow_dispatch: # Manual trigger

jobs:
  track-analytics:
    runs-on: self-hosted
    timeout-minutes: 10

    defaults:
      run:
        shell: powershell

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: vibeytb
        run: npm ci

      - name: Create .env file
        working-directory: vibeytb
        run: |
          $envContent = @"
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          "@
          # Remove leading whitespace from each line (here-string indentation artifact)
          $cleaned = ($envContent -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          $cleaned | Out-File -FilePath .env -Encoding ascii -NoNewline
          Write-Host "[DEBUG] .env created with $($cleaned.Split("`n").Count) lines"
          Write-Host "[DEBUG] Keys present: $(($cleaned -split "`n" | ForEach-Object { ($_ -split '=')[0] }) -join ', ')"

      - name: Run analytics tracker
        working-directory: vibeytb
        run: npx tsx src/agents/agent-4-publisher/analytics-tracker.ts

