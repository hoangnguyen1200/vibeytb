name: Daily YouTube Pipeline

on:
  schedule:
    - cron: "0 2 * * *" # 9:00 AM Vietnam = 10:00 PM EST = 7:00 PM PST
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  run-pipeline:
    runs-on: self-hosted
    timeout-minutes: 30

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vibeytb/package-lock.json

      - name: Install dependencies
        working-directory: vibeytb
        run: npm ci

      - name: Create BGM directory
        run: New-Item -ItemType Directory -Force -Path vibeytb/assets/bgm

      - name: Create .env file
        working-directory: vibeytb
        run: |
          @"
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Run pipeline
        working-directory: vibeytb
        env:
          ALLOW_DRY_SEED: "true"
        run: npx tsx src/scripts/the-orchestrator.ts

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: vibeytb/tmp/
